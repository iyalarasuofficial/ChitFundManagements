services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: chit-fund-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-chit_fund}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chit-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chit-fund-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/chit_fund}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - chit-network
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:3001/
        VITE_SOCKET_URL: http://backend:3001/
    container_name: chit-fund-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chit-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  chit-network:
    driver: bridge
